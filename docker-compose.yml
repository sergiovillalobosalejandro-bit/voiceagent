services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      - N8N_WEBHOOK_URL=http://n8n:5678
    volumes:
      - ./backend:/app
      - hf_cache:/root/.cache/huggingface
    restart: unless-stopped
    networks:
      - n8n_net

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend
    volumes:
      - ./frontend/src:/app/src
    restart: unless-stopped

  mcp-bridge:
    build: ./n8n-mcp-bridge
    ports:
      - "5679:5679"
    environment:
      - N8N_WEBHOOK_URL=http://n8n:5678
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - n8n_net

volumes:
  hf_cache:

networks:
  n8n_net:
    external: true
