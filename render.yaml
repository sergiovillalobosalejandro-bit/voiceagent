# Blueprint Render — SoundBot backend
# Dashboard: New > Blueprint > conectar repo y aplicar este archivo
services:
  - type: web
    name: soundbot-backend
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: free
    healthCheckPath: /health
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_TEXT_MODEL
        value: llama-3.3-70b-versatile
      - key: GROQ_VISION_MODEL
        value: meta-llama/llama-4-scout-17b-16e-instruct
      - key: MAX_MODEL_TOKENS
        value: "512"
      - key: CORS_ORIGINS
        value: http://localhost:5173,http://localhost:3000,https://frontend-ruddy-nine-54.vercel.app
